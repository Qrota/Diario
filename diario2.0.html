<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#f7d2d2">
    <link rel="icon" href="imagens/logo_acalantobebe1.png" type="image/x-icon">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Diário Acalanto Bebê</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f3a8a8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Acalanto">
    <link rel="apple-touch-icon" href="logo_acalantobebe1.png">

    <style>
        :root {
            --bg-light: #f0f4f8;
            --primary: #f7d2d2;
            --text: #3b3a3a;
            --rosa-forte: #ff6fb7;
            --glass-bg: rgba(240, 233, 233, 0.562);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-soft: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        /* RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
        }

        body {
            background: #ffffff00;
            min-height: 100dvh;
            width: 100%;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(#fcd9d999, #a0dcff79);
            background-size: cover;
            background-position: center;
            opacity: 0.09;
            z-index: 0;
        }

        .container {
            width: 100%;
            min-height: 100dvh;
            padding: 24px 20px;
            background: linear-gradient(135deg, #969696f8, #969696f8);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-top: calc(env(safe-area-inset-top) + 20px);
            padding-bottom: calc(env(safe-area-inset-bottom) + 30px);
        }

        .container * {
            position: relative;
            z-index: 1;
        }

        /* LOGO */
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo h1 {
            font-weight: 700;
            color: #ffffff;
            font-size: 28px;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 8px rgba(255, 133, 133, 0.2);
        }

        /* FORMS - GLASS CARD */
        form {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px 20px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 20px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        select, input {
            width: 100%;
            padding: 12px 12px;
            border-radius: 10px;
            border: 1px solid rgb(168, 167, 167);
            outline: none;
            font-size: 15px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.548);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            background: #ffffff;
            border-color: #ff9e9e;
            box-shadow: 0 0 0 3px rgba(255, 158, 158, 0.2);
        }

        .time-wrapper {
            display: flex;
            gap: 10px;
        }

        .btn-now {
            border: none;
            padding: 0 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            background: #73c8d3;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(115, 200, 211, 0.3);
        }

        .btn-now:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(115, 200, 211, 0.4);
        }
        .btn-now:active {
            transform: translateY(0);
        }

        .radio-group {
            padding: 12px;
            border-radius: 10px;
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            background: rgba(218, 188, 188, 0.5);
            border: 1px solid var(--glass-border);
        }

        .radio-group label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            font-weight: 400;
            margin-bottom: 0;
        }

        .radio-group input[type="radio"] {
            margin-right: 8px;
            accent-color: #ff9e9e;
            width: 18px;
            height: 18px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-confirm { 
            background: linear-gradient(135deg, #ff9e9e, #ff8585);
            color: #fff;
            box-shadow: 0 6px 16px rgba(255, 158, 158, 0.3);
        }
        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 158, 158, 0.4);
        }
        .btn-confirm:active {
            transform: translateY(0);
        }

        .btn-register { 
            background: linear-gradient(135deg, #5bbbc5, #4ca8b2);
            color: #fff; 
            margin-top: 10px; 
            box-shadow: 0 6px 16px rgba(91, 187, 197, 0.3);
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(91, 187, 197, 0.4);
        }
        .btn-register:active {
            transform: translateY(0);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-save { 
            color: #b57a27;
            background: #faefdf;
            border: 1px solid rgba(194, 139, 60, 0.2);
            box-shadow: 0 4px 10px rgba(194, 139, 60, 0.1);
        }
        .btn-save:hover { background: #fdf5e8; transform: translateY(-2px); }

        .btn-share { 
            color: #1eab52;
            background: #dcffe9; 
            border: 1px solid rgba(37, 211, 102, 0.2);
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.1);
        }
        .btn-share:hover { background: #e8fff1; transform: translateY(-2px); }

        .btn-clear {
            grid-column: span 2;
            background: #fff0f0;
            color: #e04a4a;
            border: 1px solid rgba(224, 74, 74, 0.2);
            box-shadow: 0 4px 10px rgba(224, 74, 74, 0.1);
        }
        .btn-clear:hover { background: #ffe4e4; transform: translateY(-2px); }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            margin-top: 30px;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 1px 1px 4px rgba(255, 133, 133, 0.1);
        }

        #list {
            list-style: none;
            overflow-y: visible;
        }

        #list li {
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            border-left: 5px solid #ff9e9e;
            animation: slideIn 0.3s ease;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #list li:hover {
            transform: translateX(4px) translateY(-2px);
            box-shadow: 0 10px 25px rgba(31, 38, 135, 0.08);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            margin-top: 35px;
            text-align: center;
            font-size: 10px;
            color: #ffffff6c;
            letter-spacing: 0.5px;
        }
        .footer-logo {
            display: block;
            margin: 15px auto 0;
            width: 40px;
            height: 30px;
            background: url('logo_acalantobebe1.png') center/contain no-repeat;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        .footer-logo:hover {
            opacity: 1;
        }

        @media (max-height: 600px) {
            .logo h1 { font-size: 24px; }
            .container { padding: 16px 12px; }
            button { padding: 12px; font-size: 15px; }
            select, input { padding: 12px 12px; font-size: 14px; }
            .actions { grid-template-columns: 1fr; }
            .btn-clear { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><h1>Diário Acalanto Bebê</h1></div>

    <form id="infoForm">
        <div class="field-group">
            <label>Profissional</label>
            <select id="professional" required>
                <option value="">— Selecione —</option>
                <option>Auricelia Gomes</option>
                <option>Jociane Batista</option>
                <option>Grazielle Pereira</option>
                <option>Carla Cristina </option>
                <option>Silvia da Silva</option>
            </select>
        </div>
        <div class="field-group">
            <label>Atendimento</label>
            <select id="atendimento" required>
    <option value="">— Selecione —</option>

    <option value="LIVIA_GABRIEL">
        Mãe (Livia) - Bebê (Gabriel)
    </option>

        <option value="LOHANE_DAVI">
        Mãe (Lohane) - Bebê (Davi)
    </option>
        <option value="DANIELLE_HELENA">
        Mãe (Danielle) - Bebê (Helena)
        </option>
</select>
        </div>
        <button type="submit" class="btn-confirm">Iniciar Diário</button>
    </form>



    <form id="activityForm">
        <div class="field-group">
            <label>Horário</label>
            <div class="time-wrapper">
                <input type="time" id="time" required>
                <button type="button" class="btn-now" onclick="updateTimeToNow()">AGORA</button>
            </div>
        </div>

        <div class="field-group">
            <label>Atividade</label>
            <select id="activity" required onchange="toggleActivityOptions()">
                <option value="">Selecione...</option>
                <option value="troca de fralda">🚼 Troca de fralda</option>
                <option value="medicacao">💊 Medicação</option>
                <option value="banho">🛁 Banho</option>
                <option value="recreacao">🧸 Recreação </option>
                <option value="amamentacao">🍼 Amamentação</option>
                <option value="sono">😴 Sono (Janelas) </option>
            </select>
        </div>

        <div id="fraldaOptions" style="display: none;" class="field-group">
            <label>Tipo de troca</label>
            <div class="radio-group">
                <label><input type="radio" name="tipo_troca" value="coco"> 💩 Cocô</label>
                <label><input type="radio" name="tipo_troca" value="xixi"> 💧 Xixi</label>
                <label><input type="radio" name="tipo_troca" value="coco_xixi"> 💩💧 Ambos</label>
            </div>
        </div>
        <div id="sonoOptions" style="display: none;" class="field-group">
        <label>Evento de Sono</label>
        <div class="radio-group">
            <label><input type="radio" name="tipo_sono" value="dormiu"> 🛌 Dormiu (Fecha Janela)</label>
            <label><input type="radio" name="tipo_sono" value="acordou"> ☀️ Acordou (Abre Janela)</label>
            <label><input type="radio" name="tipo_sono" value="despertou_voltou"> 😴 Despertou (Voltou a dormir)</label>
            <label><input type="radio" name="tipo_sono" value="despertou_colo"> 🤱 Despertou (Pego no colo)</label> 
        </div>
        <div style="margin-top: 10px;">
            <label><input type="checkbox" id="primeiro_despertar" value="sim"> Primeiro despertar do dia (Início da rotina)</label>
        </div>
    </div>


        <div class="field-group">
            <label>Observação</label>
            <input type="text" id="obs" placeholder="Ex: Mamou 15min cada seio">
        </div>

        <button type="submit" class="btn-register">Registrar Atividade</button>
    </form>

    <h2 class="section-title">Atividades de Hoje</h2>
    <ul id="list"></ul>

    <div class="actions">
        <button id="save" class="btn-save">Salvar .txt</button>
        <button id="share" class="btn-share">WhatsApp</button>
        <button onclick="clearAllData()" class="btn-clear">Limpar Tudo (Novo Plantão)</button>
    </div>

    <div class="footer">Sistema interno • Acalanto Bebê</div>
          <div class="footer-logo"></div>
</div>
    <script>
    // ⚠️ COLE A URL DA SUA IMPLANTAÇÃO AQUI EMBAIXO:
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzoTzx12loJh2mcNQyW_JQYK1hjvuYcYTmkucSbc4spJl7JH0JYWyeoGgF6BKOLp6N_/exec";

    let activitiesArray = JSON.parse(localStorage.getItem('acalanto_activities')) || [];
    let sessionData = JSON.parse(localStorage.getItem('acalanto_session')) || null;
    let currentLocation = null;

    function entrarFullscreen() {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) return; 
        const el = document.documentElement;
        const requestMethod = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (requestMethod) requestMethod.call(el).catch(err => console.log(err));
    }

    document.addEventListener("click", entrarFullscreen, { once: true });

    window.addEventListener('load', () => {
        getLocation(); 
        updateTimeToNow();
        renderList();
        if (sessionData) {
    document.getElementById('professional').value =
        sessionData.professional;

    document.getElementById('atendimento').value =
        sessionData.atendimentoCodigo;
}
    });
    function toggleActivityOptions() {
    toggleFraldaOptions();
    toggleSonoOptions();
}

    function getLocation() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { currentLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude }; },
                (err) => console.warn("Erro localização:", err.message),
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }
    }

    function updateTimeToNow() {
        const now = new Date();
        document.getElementById("time").value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    }

    function toggleFraldaOptions() {
        const activity = document.getElementById("activity").value;
        document.getElementById("fraldaOptions").style.display = (activity === "troca de fralda") ? "block" : "none";
    }
     function toggleSonoOptions() {

    const activity =
        document.getElementById("activity").value;

    const sonoOptions =
        document.getElementById("sonoOptions");

    if (activity === "sono") {

        sonoOptions.style.display = "block";

    } else {

        sonoOptions.style.display = "none";

        document
            .querySelectorAll('input[name="tipo_sono"]')
            .forEach(r => r.checked = false);

        document.getElementById(
            "primeiro_despertar"
        ).checked = false;
    }
}
    document.getElementById("infoForm").addEventListener("submit", e => {

    e.preventDefault();

    const atendimentoSelect =
        document.getElementById("atendimento");

    sessionData = {

        professional:
            document.getElementById("professional").value,

        atendimento:
            atendimentoSelect.options[
                atendimentoSelect.selectedIndex
            ].text,

        atendimentoCodigo:
            atendimentoSelect.value
    };

    localStorage.setItem(
        "acalanto_session",
        JSON.stringify(sessionData)
    );

    alert("✅ Tudo pronto para o seu diário!");
});

    // --- FUNÇÃO DE ENVIO PARA O GOOGLE SHEETS ---
    async function sendToGoogleSheets(data) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // 👈 Evita erros de CORS com o Google Script
                headers: {
                    "Content-Type": "text/plain" // 👈 Evita o preflight que bloqueia o envio
                },
                body: JSON.stringify(data)
            });

            // Nota: No modo 'no-cors', a resposta vem opaca (vazia), 
            // mas os dados CHEGAM e são salvos na planilha perfeitamente.
            console.log("Requisição enviada para o Apps Script.");
            return true;

        } catch (error) {
            console.error("Erro ao enviar:", error);
            return false;
        }
    }

    document.getElementById("activityForm").addEventListener("submit", async e => {
        e.preventDefault();
        if (!sessionData) return alert("⚠️ Primeiro, selecione seu nome e o atendimento!");
        const activity = document.getElementById("activity").value;
        let tipoTrocaLabel = "";
        let tipoSonoLabel = "";
        let primeiroDespertar = false;

        if (activity === "sono") {
    const sonoSelecionado =
        document.querySelector('input[name="tipo_sono"]:checked');
    if (!sonoSelecionado)
        return alert("⚠️ Selecione Dormiu ou Acordou!");

    const labelsSono = {
        dormiu: "🛌 Dormiu",
        acordou: "☀️ Acordou",
        despertou_voltou: "😴 Despertou (Voltou a dormir)",
        despertou_colo: "🤱 Despertou (Pego no colo)"
    };
    tipoSonoLabel = labelsSono[sonoSelecionado.value];
    primeiroDespertar =
        document.getElementById("primeiro_despertar").checked;
}

        
        if (activity === "troca de fralda") {
            const r = document.querySelector('input[name="tipo_troca"]:checked');
            if (!r) return alert("⚠️ Selecione o tipo de troca!");
            const labels = { 'coco': '💩 Cocô', 'xixi': '💧 Xixi', 'coco_xixi': '💩💧 Ambos' };
            tipoTrocaLabel = labels[r.value];
        }

        const newActivity = {
    date: new Date().toLocaleDateString('pt-BR'),
    timestamp: new Date().toISOString(),

    professional: sessionData.professional,
    atendimento: sessionData.atendimento,
    atendimentoCodigo: sessionData.atendimentoCodigo,

    time: document.getElementById("time").value,
    activity: activity,

    tipoTroca: tipoTrocaLabel,
    tipoSono: tipoSonoLabel,
    primeiroDespertar: primeiroDespertar,

    obs: document.getElementById("obs").value,

    location: currentLocation
        ? `${currentLocation.lat}, ${currentLocation.lon}`
        : "Não disponível"
};

        // Salva Localmente
        activitiesArray.push(newActivity);
        localStorage.setItem('acalanto_activities', JSON.stringify(activitiesArray));
        
        // Envia para o Google Planilhas
        const enviado =
    await sendToGoogleSheets(
        newActivity
    );

if (!enviado) {

    alert(
        "Registro salvo localmente. Não foi possível sincronizar com a planilha."
    );
}

        renderList();
        e.target.reset();
        document
    .querySelectorAll('input[name="tipo_sono"]')
    .forEach(r => r.checked = false);

document
    .querySelectorAll('input[name="tipo_troca"]')
    .forEach(r => r.checked = false);

document.getElementById(
    "primeiro_despertar"
).checked = false;
        updateTimeToNow();
        toggleFraldaOptions();
        toggleSonoOptions();
    });

    function renderList() {
        const list = document.getElementById("list");
        if (activitiesArray.length === 0) {
            list.innerHTML = '<li style="color:#999; text-align:center">Nenhum registro.</li>';
            return;
        }
        list.innerHTML = '';
        activitiesArray.forEach((item) => {
            const li = document.createElement("li");
            let titulo = item.activity.toUpperCase();
if (item.tipoTroca)
    titulo += ` - ${item.tipoTroca}`;
if (item.tipoSono)
    titulo += ` - ${item.tipoSono}`;
if (item.primeiroDespertar)
    titulo += ` (Primeiro despertar)`;
            li.innerHTML = `
                <div style="display: flex; justify-content: space-between;">
                    <strong>${item.time}</strong>
                    <span style="color: #ff6fb7; font-weight: 700; font-size: 13px;">${titulo}</span>
                </div>
                ${item.obs ? `<div style="margin-top: 5px; font-size: 13px; color: #777; border-top: 1px dashed #eee; padding-top: 3px;">📝 ${item.obs}</div>` : ''}
            `;
            list.appendChild(li);
        });
    }

    function clearAllData() {
        if (confirm("⚠️ Deseja apagar tudo? Isso limpa apenas a lista local.")) {
            localStorage.clear();
            activitiesArray = [];
            sessionData = null;
            location.reload();
        }
    }

    // Botões de salvar e compartilhar permanecem iguais...
    document.getElementById("save").addEventListener("click", () => {
        if (!sessionData || activitiesArray.length === 0) return alert("⚠️ Nada para salvar!");
        let content = `DIÁRIO ACALANTO BEBÊ\nPROFISSIONAL: ${sessionData.professional}\nATENDIMENTO: ${sessionData.atendimento}\n\n`;
        activitiesArray.forEach((a, i) => {

    let detalhes = [];
    if (a.tipoTroca)
        detalhes.push(a.tipoTroca);
    if (a.tipoSono)
        detalhes.push(a.tipoSono);
    if (a.primeiroDespertar)
        detalhes.push("Primeiro despertar");
    content += `${i + 1}. [${a.time}] ${a.activity.toUpperCase()}`;
    if (detalhes.length)
        content += ` (${detalhes.join(" | ")})`;
    content += `\n`;
    content += `   📍 Localização: ${a.location}\n`;
    if (a.obs)
        content += `   Obs: ${a.obs}\n`;
    content += `---------------------------\n`;
});
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `diario_acalanto.txt`;
        a.click();
    });

    document.getElementById("share").addEventListener("click", () => {
        if (!sessionData || activitiesArray.length === 0) return alert("⚠️ Nada para compartilhar!");
        let msg = `*DIÁRIO ACALANTO BEBÊ*\n*Profissional:* ${sessionData.professional}\n*Atendimento:* ${sessionData.atendimento}\n\n`;
        activitiesArray.forEach(a => {
    let detalhes = [];
    if (a.tipoTroca)
        detalhes.push(a.tipoTroca);
    if (a.tipoSono)
        detalhes.push(a.tipoSono);
    if (a.primeiroDespertar)
        detalhes.push("Primeiro despertar");
    msg += `• [${a.time}] *${a.activity.toUpperCase()}*`;
    if (detalhes.length)
        msg += ` [${detalhes.join(" | ")}]`;
    msg += `\n`;
    if (a.obs)
        msg += `_${a.obs}_`;
    msg += `\n\n`;
});        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    });
