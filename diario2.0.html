<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Acalanto Bebê | Registro de Atendimento</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f0f4f8;
    --primary: #f7d2d2;
    --text: #474646;
    --rosa-forte: #ff6fb7;
    --shadow-light: #ffffff;
    --shadow-dark: #d1d9e6;
    
    /* Novas variáveis para melhor contraste */
    --btn-entrada-bg: #f7d4df;
    --btn-entrada-text: #8a414a; /* Tom mais escuro para leitura */
    --btn-saida-bg: #fcdfd2;
    --btn-saida-text: #8c4231;   /* Tom mais escuro para leitura */
    --disabled-bg: #e0e5ec;
    --disabled-text: #a3b1c6;
}

/* RESET */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
}


body {
    margin: 0;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* === CONTAINER === */

.container::before {
    content: "";
    position: absolute;

    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: url("imagens/mae_bebe_contorno3.png");
    background-size: cover;
    background-position: center;

    opacity: 0.07;   /* controla apenas a imagem */

    z-index: 0;
}
.container * {
    position: relative;
    z-index: 1;
}
.container {
    width: 100%;
    max-width: 620px;
    padding: 30px 25px;
    border-radius: 10px;

    background: linear-gradient(#fcd9d979, #a0dcff5e);
    box-shadow: 
        12px 12px 25px var(--shadow-dark),
        -12px -12px 25px var(--shadow-light);

    position: relative;
}

/* === LOGO === */
.logo {
    text-align: center;
    margin-bottom: 40px;
}
.logo h1 {
    margin: 0;
    color: #ffaaaa;
    font-weight: 300;
}
.logo span {
    font-size: 14px;
    color: var(--text);
}

/* === CAMPOS === */
.select-wrapper {
    margin-top: 18px;
}
.select-wrapper label {
    display: block;
    font-size: 12px;
    color: #525050;
    margin-bottom: 6px;
    font-weight: 400;
}

/* INPUT NEUMORPHIC (AFUNDADO) */
select, input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ffffff;
    outline: none;
    font-size: 16px;
    color: var(--text);
    background: var(--bg);

    box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);

    transition: 0.2s;
}

select:focus, input:focus {
    box-shadow: 
        inset 2px 2px 5px var(--shadow-dark),
        inset -2px -2px 5px var(--shadow-light);
}

/* === BOTÕES === */
button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #ffffff;
    font-size: 16px;
    font-weight: 600;
    margin-top: 18px;
    cursor: pointer;

    background: var(--bg);
    color: var(--text);

    box-shadow:
        6px 6px 12px var(--shadow-dark),
        -6px -6px 12px var(--shadow-light);

    transition: all 0.2s ease;
}
/* ESTADO DESATIVADO VISUAL */
button:disabled {
    background: var(--disabled-bg) !important;
    color: var(--disabled-text) !important;
    box-shadow: none !important;
    transform: none !important;
    opacity: 1; /* importante para não ficar transparente demais */
    cursor: not-allowed;
}

/* ESTADO ATIVO FORTE */
.entrada.ativo {
    background: linear-gradient(135deg, #fcbfd1, #fdb9ca);
    color: #fff;
}

.saida.ativo {
    background: linear-gradient(135deg, #ffb38a, #f59670);
    color: #fff;
}
/* HOVER */
button:hover {
    transform: translateY(-2px);
}

/* CLIQUE (AFUNDADO) */
button:active {
    box-shadow:
        inset 4px 4px 10px var(--shadow-dark),
        inset -4px -4px 10px var(--shadow-light);
    transform: scale(0.97);
}

/* VARIAÇÕES */
.entrada {
    background: #f7d4df;
    color: #e07a86;
}
.entrada:active {
    background: #e4e4e4;
    color:#aca9a8;

}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* === STATUS === */
#status {
    margin-top: 24px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
}
.loading { color: #888; }
.sucesso { color: #4caf50; }
.erro { color: #e74c3c; }

/* === INFO === */
.info {
    margin-top: 15px;
    font-size: 13px;
    text-align: center;
    color: var(--text);
}

/* === FOOTER === */
.footer {
    margin-top: 10px;
    text-align: center;
    font-size: 0.75rem;
    color: #5c5b5b;
}
.footer-logo {
    display: block;
    margin: 18px auto 0;
    width: 32px;
    height: 24px;
    background: url('imagens/logo_acalantobebe1.png') center/contain no-repeat;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>Acalanto Bebê</h1>
        <span>Registro de Atendimento</span>
    </div>

    <div class="select-wrapper">
        <label>Nome da Profissional Parceira</label>
        <select id="nome">
            <option value="">— Selecione —</option>
            <option value="Auricelia">Auricelia Gomes</option>
            <option value="Jociane">Jociane Batista</option>
            <option value="Sonia">Sonia Felix </option>
            <option value="Grazielle">Grazielle Pereira</option>
            <option value="Carla">Carla Cantanhede</option>
        </select>
    </div>

    <div class="select-wrapper">
        <label>Selecione o atendimento</label>
        <select id="cargo">
            <option value="">— Selecione —</option>
            <option value="(Livia)-(Gabriel)">Mãe (Livia) - Bebê (Gabriel)</option>
            <option value="(Mariah)-(Gêmeos)">Mãe (Mariah) - Bebês (Gêmeos)</option>
            <option value="(Mariana)-(Antônio)">Mãe (Mariana) - Bebê (Antônio)</option>
        </select>
    </div>

    <button id="btnInicio" class="entrada" onclick="iniciarServico()">
        Iníciar Atendimento
    </button>

    <button id="btnFim" class="saida" onclick="finalizarServico()">
        Finalizar Atendimento
    </button>

    <div id="status"></div>

    <div class="info">
        Registro automático com data, hora e localização GPS
    </div>

    <div class="footer">
        Sistema interno • Acalanto Bebê
        <div class="footer-logo"></div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzvqdCRE_qLfGVbgeUTTEWkxAWPXoHvvUQ9uKUDevAt53V5cWASmRyAbEO_ufzjC88/exec";
let enviando = false;

// Seleção dos elementos para controle de estado
const btnIniciar = document.querySelector('.entrada');
const btnFinalizar = document.querySelector('.saida');
const campoNome = document.getElementById("nome");
const campoCargo = document.getElementById("cargo");

// --- LÓGICA DE ESTADO INICIAL ---
btnFinalizar.disabled = true;
btnFinalizar.classList.remove("ativo");
btnIniciar.classList.add("ativo"); // Começa bloqueado
validarCampos(); // Valida se já há algo preenchido (ex: preenchimento automático)

// Ouvintes para validar os campos enquanto o usuário digita/seleciona
campoNome.addEventListener('input', validarCampos);
campoCargo.addEventListener('change', validarCampos);

function validarCampos() {
    // O botão iniciar só habilita se:
    // 1. Nome e Cargo estiverem preenchidos
    // 2. O serviço ainda NÃO foi iniciado (btnFinalizar ainda está desativado)
    const camposOk = campoNome.value.trim() !== "" && campoCargo.value !== "";
    
    if (camposOk && btnFinalizar.disabled) {
        btnIniciar.disabled = false;
    } else {
        btnIniciar.disabled = true;
    }
}

function horaAtual() {
    return new Date().toLocaleString("pt-BR", { 
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit' 
    });
}

function registrar(tipo) {
    if (enviando) return;

    const nome = campoNome.value;
    const cargo = campoCargo.value;

    if (!nome || !cargo) {
        alert("Por favor, preencha todos os campos antes de prosseguir.");
        return;
    }

    const statusEl = document.getElementById("status");
    statusEl.className = "status loading";
    statusEl.innerHTML = "Obtendo localização GPS...";

    navigator.geolocation.getCurrentPosition(
        pos => {
            enviar(nome, cargo, tipo, pos.coords.latitude, pos.coords.longitude);
        },
        () => {
            statusEl.className = "status erro";
            statusEl.innerHTML = "⚠ Ative o GPS para registrar o atendimento";
        },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

function enviar(nome, cargo, tipo, lat, lon) {
    enviando = true;
    const statusEl = document.getElementById("status");
    statusEl.className = "status loading";
    statusEl.innerHTML = "Salvando registro...";

    fetch(API, {
        method: "POST",
        body: JSON.stringify({
            nome: nome,
            cargo: cargo,
            tipo: tipo,
            data: horaAtual(),
            lat: lat,
            lon: lon
        })
    })
    .then(r => r.text())
    .then(() => {
        statusEl.className = "status sucesso";
        statusEl.innerHTML = tipo === "Início" 
            ? "✔ Serviço iniciado com sucesso!" 
            : "✔ Serviço finalizado com sucesso!";

        // --- LÓGICA DE ALTERNÂNCIA DE BOTÕES APÓS SUCESSO ---
        if (tipo === "Início") {

    // Iniciar desliga
    btnIniciar.disabled = true;
    btnIniciar.classList.remove("ativo");

    // Finalizar liga
    btnFinalizar.disabled = false;
    btnFinalizar.classList.add("ativo");

} else {

    // Finalizar desliga
    btnFinalizar.disabled = true;
    btnFinalizar.classList.remove("ativo");

    // Iniciar volta ao normal
    campoNome.value = "";
    campoCargo.value = "";

    validarCampos(); // reativa se válido

}

        enviando = false;
        setTimeout(() => { statusEl.innerHTML = ""; }, 5000);
    })
    .catch(() => {
        statusEl.className = "status erro";
        statusEl.innerHTML = "❌ Erro ao salvar. Tente novamente.";
        enviando = false;
    });
}

function iniciarServico() {
    if (confirm("Desejamos um excelente atendimento! Confirma o início do serviço agora?")) {
        registrar("Início");
    }
}

function finalizarServico() {
    if (confirm("Parabéns por mais um atendimento realizado com sucesso! Confirma a finalização do serviço agora?")) {
        registrar("Fim");
    }
}

/* Fullscreen */
function isIOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent); }
function entrarFullscreen() {
    if (isIOS()) return;
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
}
document.body.addEventListener("click", entrarFullscreen, { once: true });
</script>
</body>
</html>
