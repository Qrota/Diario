<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário Acalanto Bebê</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f3a8a8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Acalanto">
    <link rel="apple-touch-icon" href="logo_acalantobebe1.png">

    <style>
        :root {
            --primary: #f7d2d2;
            --text: #555;
            --rosa-forte: #ff6fb7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            font-weight: 300;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(rgba(255, 245, 238, 0.6), rgba(238, 212, 204, 0.6)), url("fundo08.png");
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 620px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(188, 243, 252, 0.5);
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            position: relative;
        }

        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-weight: 400; color: #f3a8a8; font-size: 32px; }

        .field-group { margin-bottom: 18px; position: relative; }
        label { display: block; font-size: 12px; color: #525050; margin-bottom: 6px; font-weight: 400; }

        select, input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            background: white;
            font-size: 16px;
            color: #555;
            border: 1px solid #e2c2c2;
            transition: all 0.3s ease;
        }

        /* Estilo para o Input de Tempo com botão Agora */
        .time-wrapper { display: flex; gap: 8px; }
        .btn-now {
            background: #f3a8a8;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }

        .radio-group {
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2c2c2;
            display: flex; gap: 15px; flex-wrap: wrap;
        }

        .radio-group label { display: inline-flex; align-items: center; margin: 0; cursor: pointer; }
        .radio-group input[type="radio"] { width: auto; margin-right: 5px; }

        button {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        .btn-confirm { background: linear-gradient(135deg, #fcb3c5, #f3a3b8); color: white; }
        .btn-register { background: linear-gradient(135deg, #b9f9fd, #afe7ee); color: #333; margin-top: 10px; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .btn-save { background: #ffd6a5; color: #333; }
        .btn-share { background: #25d366; color: white; }
        .btn-clear { background: #ffcccc; color: #a33; grid-column: span 2; margin-top: 10px; font-size: 12px; padding: 8px; }

        #list { list-style: none; margin-top: 15px; max-height: 350px; overflow-y: auto; }
        #list li {
            background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px;
            border-left: 5px solid #f3a8a8; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><h1>Acalanto Bebê</h1></div>

    <form id="infoForm">
        <div class="field-group">
            <label>Profissional</label>
            <select id="professional" required>
                <option value="">— Selecione —</option>
                <option>Auricelia Gomes</option><option>Jociane Batista</option>
                <option>Sonia Felix</option><option>Grazielle Pereira</option>
                <option>Carla Cantanhede</option>
            </select>
        </div>
        <div class="field-group">
            <label>Atendimento</label>
            <select id="atendimento" required>
                <option value="">— Selecione —</option>
                <option>Mãe (Livia) - Bebê (Gabriel)</option>
                <option>Mãe (Mariah) - Bebês (Gêmeos)</option>
                <option>Mãe (Mariana) - Bebê (Antônio)</option>
            </select>
        </div>
        <button type="submit" class="btn-confirm">Confirmar Dados da Sessão</button>
    </form>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #ddd;">

    <form id="activityForm">
        <div class="field-group">
            <label>Horário</label>
            <div class="time-wrapper">
                <input type="time" id="time" required>
                <button type="button" class="btn-now" onclick="updateTimeToNow()">AGORA</button>
            </div>
        </div>

        <div class="field-group">
            <label>Atividade</label>
            <select id="activity" required onchange="toggleFraldaOptions()">
                <option value="">Selecione...</option>
                <option value="troca de fralda">🚼 Troca de fralda</option>
                <option value="medicacao">💊 Medicação</option>
                <option value="banho">🛁 Banho</option>
                <option value="amamentacao">🍼 Amamentação</option>
                <option value="sono">😴 Bebê dormindo</option>
            </select>
        </div>

        <div id="fraldaOptions" style="display: none;" class="field-group">
            <label>Tipo de troca</label>
            <div class="radio-group">
                <label><input type="radio" name="tipo_troca" value="coco"> 💩 Cocô</label>
                <label><input type="radio" name="tipo_troca" value="xixi"> 💧 Xixi</label>
                <label><input type="radio" name="tipo_troca" value="coco_xixi"> 💩💧 Ambos</label>
            </div>
        </div>

        <div class="field-group">
            <label>Observação</label>
            <input type="text" id="obs" placeholder="Ex: Mamou 15min cada seio">
        </div>

        <button type="submit" class="btn-register">Registrar Atividade</button>
    </form>

    <h2 style="font-size: 18px; margin-top: 25px; color: #f3a8a8;">Atividades de Hoje</h2>
    <ul id="list"></ul>

    <div class="actions">
        <button id="save" class="btn-save">Salvar .txt</button>
        <button id="share" class="btn-share">WhatsApp</button>
        <button onclick="clearAllData()" class="btn-clear">Limpar Tudo (Novo Plantão)</button>
    </div>

    <div class="footer">Sistema Acalanto • v2.0</div>
</div>

<script>
    // Carrega dados salvos ou inicia vazio
    let activitiesArray = JSON.parse(localStorage.getItem('acalanto_activities')) || [];
    let sessionData = JSON.parse(localStorage.getItem('acalanto_session')) || null;

    // Inicialização ao carregar a página
    window.addEventListener('load', () => {
        getLocation(); // 🔥 chama localização
        updateTimeToNow();
        renderList();
        
        // Se já houver sessão salva, preenche os campos automaticamente
        if (sessionData) {
            document.getElementById('professional').value = sessionData.professional;
            document.getElementById('atendimento').value = sessionData.atendimento;
        }
    });

    function updateTimeToNow() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById("time").value = `${hours}:${minutes}`;
    }

    function toggleFraldaOptions() {
        const activity = document.getElementById("activity").value;
        const divFralda = document.getElementById("fraldaOptions");
        divFralda.style.display = (activity === "troca de fralda") ? "block" : "none";
    }

    // Salvar Dados da Sessão
    document.getElementById("infoForm").addEventListener("submit", e => {
        e.preventDefault();
        sessionData = {
            professional: document.getElementById("professional").value,
            atendimento: document.getElementById("atendimento").value
        };
        localStorage.setItem('acalanto_session', JSON.stringify(sessionData));
        alert("✅ Dados da sessão guardados!");
    });

    // Registrar Atividade
    document.getElementById("activityForm").addEventListener("submit", e => {
        e.preventDefault();
        if (!sessionData) return alert("⚠️ Primeiro, confirme os dados da sessão (nome e atendimento)!");

        const activity = document.getElementById("activity").value;
        let tipoTrocaLabel = "";
        
        if (activity === "troca de fralda") {
            const r = document.querySelector('input[name="tipo_troca"]:checked');
            if (!r) return alert("⚠️ Selecione se foi Cocô, Xixi ou Ambos!");
            
            const labels = { 'coco': '💩 Cocô', 'xixi': '💧 Xixi', 'coco_xixi': '💩💧 Ambos' };
            tipoTrocaLabel = labels[r.value];
        }

        const newActivity = {
    time: document.getElementById("time").value,
    activity: activity,
    tipoTroca: tipoTrocaLabel,
    obs: document.getElementById("obs").value,
    location: currentLocation ? `${currentLocation.lat}, ${currentLocation.lon}` : "Não disponível",
    date: new Date().toLocaleDateString('pt-BR')
};

        activitiesArray.push(newActivity);
        localStorage.setItem('acalanto_activities', JSON.stringify(activitiesArray));
        
        renderList();
        e.target.reset(); // Limpa o formulário de atividade
        updateTimeToNow();
        toggleFraldaOptions();
    });

    function renderList() {
        const list = document.getElementById("list");
        if (activitiesArray.length === 0) {
            list.innerHTML = '<li style="color:#999; text-align:center">Nenhum registro.</li>';
            return;
        }

        list.innerHTML = '';
        activitiesArray.forEach((item) => {
            const li = document.createElement("li");
            let titulo = item.activity.toUpperCase();
            if (item.tipoTroca) titulo += ` - ${item.tipoTroca}`;

            li.innerHTML = `
                <div style="display: flex; justify-content: space-between;">
                    <strong>${item.time}</strong>
                    <span style="color: #ff6fb7; font-weight: 700; font-size: 13px;">${titulo}</span>
                </div>
                ${item.obs ? `<div style="margin-top: 5px; font-size: 13px; color: #777; border-top: 1px dashed #eee; padding-top: 3px;">📝 ${item.obs}</div>` : ''}
            `;
            list.appendChild(li);
        });
    }

    // Botão Limpar Tudo (CORRIGIDO)
    function clearAllData() {
        if (confirm("⚠️ Deseja apagar tudo e começar um novo plantão?")) {
            localStorage.clear();
            activitiesArray = [];
            sessionData = null;
            location.reload(); // Recarrega a página do zero
        }
    }

    // Salvar .TXT (CORRIGIDO)
    document.getElementById("save").addEventListener("click", () => {
        if (!sessionData || activitiesArray.length === 0) return alert("⚠️ Nada para salvar!");

        let content = `DIÁRIO ACALANTO BEBÊ\nPROFISSIONAL: ${sessionData.professional}\nATENDIMENTO: ${sessionData.atendimento}\nDATA: ${new Date().toLocaleDateString()}\n\n`;
        
        activitiesArray.forEach((a, i) => {
        content += `${i+1}. [${a.time}] ${a.activity.toUpperCase()}${a.tipoTroca ? ' ('+a.tipoTroca+')' : ''}\n`;
        content += `   📍 Localização: ${a.location}\n`;
        content += `${a.obs ? '   Obs: '+a.obs : ''}\n---------------------------\n`;
        });

        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `diario_acalanto_${new Date().toLocaleDateString().replace(/\//g, '-')}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });

    // Compartilhar WhatsApp
    document.getElementById("share").addEventListener("click", () => {
        if (!sessionData || activitiesArray.length === 0) return alert("⚠️ Nada para compartilhar!");
        
        let msg = `*DIÁRIO ACALANTO BEBÊ*\n*Profissional:* ${sessionData.professional}\n*Atendimento:* ${sessionData.atendimento}\n\n`;
        activitiesArray.forEach(a => {
            msg += `• [${a.time}] *${a.activity.toUpperCase()}* ${a.tipoTroca ? '['+a.tipoTroca+']' : ''}\n${a.obs ? '_'+a.obs+'_' : ''}\n\n`;
        });

        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    });

    // Segurança contra fecho acidental
    window.onbeforeunload = function() {
        if (activitiesArray.length > 0) return "Tem dados não salvos!";
    };
    // 🌍 Variável global de localização
let currentLocation = null;

// 📍 Capturar localização automaticamente
function getLocation() {
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                currentLocation = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude
                };
                console.log("📍 Localização capturada:", currentLocation);
            },
            (err) => {
                console.warn("⚠️ Erro ao obter localização:", err.message);
            },
            {
                enableHighAccuracy: true,
                timeout: 5000
            }
        );
    } else {
        console.warn("Geolocalização não suportada.");
    }
    // 🖥️ Tela cheia ao clicar
document.addEventListener("click", () => {
    const doc = document.documentElement;

    if (!document.fullscreenElement) {
        if (doc.requestFullscreen) {
            doc.requestFullscreen();
        } else if (doc.webkitRequestFullscreen) {
            doc.webkitRequestFullscreen();
        } else if (doc.msRequestFullscreen) {
            doc.msRequestFullscreen();
        }
    }
});
}
</script>
</body>
</html>
