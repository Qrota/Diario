<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#f7d2d2">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Diário Acalanto Bebê</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f3a8a8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Acalanto">
    <link rel="apple-touch-icon" href="logo_acalantobebe1.png">

    <style>
        :root {
    --bg: #f0f4f8;
    --primary: #f7d2d2;
    --text: #313131;
    --rosa-forte: #ff6fb7;
    --shadow-light: #ffffff;
    --shadow-dark: #d1d9e6;
}

/* RESET */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
}

body {
    margin: 0;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    background: #ffffff;
    min-height: 100dvh;
    width: 100%;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
    padding: 0px;
}

/* CONTAINER NEUMORPHIC */
.container::before {
    content: "";
    position: absolute;

    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: url("mae_bebe_contorno3.png");
    background-size: cover;
    background-position: center;

    opacity: 0.060;   /* controla apenas a imagem */

    z-index: 0;
}
.container * {
    position: relative;
    z-index: 1;
}
.container {
    width: 100%;
    min-height: 100dvh; /* 🔥 em vez de height fixa */

    padding: 20px 16px;

    background: linear-gradient(#fcd9d9b6, #a0dcffad);

    position: relative;

    display: flex;
    flex-direction: column;

    justify-content: flex-start; /* 🔥 evita corte */

    overflow-y: auto; /* 🔥 ESSENCIAL */
    
    -webkit-overflow-scrolling: touch; /* suavidade no iOS */

    padding-top: calc(env(safe-area-inset-top) + 10px);
    padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
}

/* LOGO */
.logo {
    text-align: center;
    margin-bottom: 30px;
}

.logo h1 {
    font-weight: 300;
    color: #ff9e9e;
    font-size: 32px;
    text-shadow: 
        10px 10px 10px ,
        
}

/* INPUT GROUP */
.field-group {
    margin-bottom: 18px;
}

label {
    display: block;
    font-size: 12px;
    color: #525050;
    margin-bottom: 6px;
    font-weight: 400;
}

/* INPUT NEUMORPHIC */
select, input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ffffff;
    outline: none;
    font-size: 16px;
    color: var(--text);
    background: var(--bg);

    box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);

    transition: 0.2s;
}

select:focus, input:focus {
    box-shadow: 
        inset 2px 2px 5px var(--shadow-dark),
        inset -2px -2px 5px var(--shadow-light);
}

/* TIME WRAPPER */
.time-wrapper {
    display: flex;
    gap: 8px;
}

/* BOTÃO PEQUENO */
.btn-now {
    border: none;
    padding: 0 15px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    color: #616161;
    background: var(--bg);

    box-shadow: 
        4px 4px 8px var(--shadow-dark),
        -4px -4px 8px #b3b2b2;
}

.btn-now:active {
    box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
}

/* RADIO GROUP */
.radio-group {
    padding: 12px;
    border-radius: 10px;
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    background: var(--bg);

    box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
}

.radio-group label {
    display: inline-flex;
    align-items: center;
    cursor: pointer;
}

.radio-group input[type="radio"] {
    margin-right: 5px;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 14px;
    border: 1px solid #ffffff;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background: var(--bg);
    color: var(--text);

    box-shadow: 
        6px 6px 12px var(--shadow-dark),
        -4px -4px 8px #b3b2b2;

    transition: 0.2s;
}

button:active {
    box-shadow: 
        inset 6px 6px 12px var(--shadow-dark),
        inset -6px -6px 12px var(--shadow-light);
}

/* BOTÕES ESPECÍFICOS */
.btn-confirm { 
    background: #f0f4f8;
    color: #e07a9a;
    

 }
.btn-register { 
    background: #f0f4f8;
    color: #5bbbc5; margin-top: 10px; }

.actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 25px;
}

.btn-save { 
    color: #c28b3c;
    background: #faefdf;
 }

.btn-share { 
    color: #25d366;
    background: #dcffe9; 
}

.btn-clear {
    grid-column: span 2;
    background: rgb(248, 228, 228);
    margin-top: 10px;
    font-size: 12px;
    padding: 8px;
    color: #a33;
}

/* LISTA */
#list {
    list-style: none;
    margin-top: 15px;

    max-height: none; /* 🔥 remove limite */
    
    overflow-y: visible; /* 🔥 deixa o container rolar */

}

#list li {
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: var(--bg);

    box-shadow: 
        4px 4px 8px var(--shadow-dark),
        -4px -4px 8px #d3d3d3;

    border-left: 4px solid #f3a8a8;
    animation: slideIn 0.3s ease;
}

/* ANIMAÇÃO */
@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-10px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* FOOTER */
.footer {
    margin-top: 30px;
    text-align: center;
    font-size: 12px;
    color: #413f3f;
}
.footer-logo {
    display: block;
    margin: 18px auto 0;
    width: 32px;
    height: 24px;
    background: url('logo_acalantobebe1.png') center/contain no-repeat;
    opacity: 0.8;
}
/* MELHOR USO EM TELAS ALTAS */
@media (min-height: 700px) {
    .container {
        justify-content: center;
    }
}

/* TELAS PEQUENAS */
@media (max-height: 600px) {

    .logo h1 {
        font-size: 22px;
    }

    .container {
        padding: 16px 12px;
    }

    button {
        padding: 12px;
        font-size: 14px;
    }

    select, input {
        padding: 10px 12px;
        font-size: 14px;
    }

    .actions {
        grid-template-columns: 1fr; /* 🔥 evita esmagar */
    }
}
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><h1>Diário Acalanto Bebê</h1></div>

    <form id="infoForm">
        <div class="field-group">
            <label>Profissional</label>
            <select id="professional" required>
                <option value="">— Selecione —</option>
                <option>Auricelia Gomes</option><option>Jociane Batista</option>
                <option>Sonia Felix</option><option>Grazielle Pereira</option>
                <option>Carla Cantanhede</option>
            </select>
        </div>
        <div class="field-group">
            <label>Atendimento</label>
            <select id="atendimento" required>
                <option value="">— Selecione —</option>
                <option>Mãe (Livia) - Bebê (Gabriel)</option>
                <option>Mãe (Mariah) - Bebês (Gêmeos)</option>
                <option>Mãe (Mariana) - Bebê (Antônio)</option>
            </select>
        </div>
        <button type="submit" class="btn-confirm">Iniciar Diário</button>
    </form>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #ddd;">

    <form id="activityForm">
        <div class="field-group">
            <label>Horário</label>
            <div class="time-wrapper">
                <input type="time" id="time" required>
                <button type="button" class="btn-now" onclick="updateTimeToNow()">AGORA</button>
            </div>
        </div>

        <div class="field-group">
            <label>Atividade</label>
            <select id="activity" required onchange="toggleFraldaOptions()">
                <option value="">Selecione...</option>
                <option value="troca de fralda">🚼 Troca de fralda</option>
                <option value="medicacao">💊 Medicação</option>
                <option value="banho">🛁 Banho</option>
                <option value="recreacao">🧸 Recreação </option>
                <option value="amamentacao">🍼 Amamentação</option>
                <option value="sono">😴 Bebê dormindo</option>
            </select>
        </div>

        <div id="fraldaOptions" style="display: none;" class="field-group">
            <label>Tipo de troca</label>
            <div class="radio-group">
                <label><input type="radio" name="tipo_troca" value="coco"> 💩 Cocô</label>
                <label><input type="radio" name="tipo_troca" value="xixi"> 💧 Xixi</label>
                <label><input type="radio" name="tipo_troca" value="coco_xixi"> 💩💧 Ambos</label>
            </div>
        </div>

        <div class="field-group">
            <label>Observação</label>
            <input type="text" id="obs" placeholder="Ex: Mamou 15min cada seio">
        </div>

        <button type="submit" class="btn-register">Registrar Atividade</button>
    </form>

    <h2 style="font-size: 18px; margin-top: 25px; color: #f3a8a8;">Atividades de Hoje</h2>
    <ul id="list"></ul>

    <div class="actions">
        <button id="save" class="btn-save">Salvar .txt</button>
        <button id="share" class="btn-share">WhatsApp</button>
        <button onclick="clearAllData()" class="btn-clear">Limpar Tudo (Novo Plantão)</button>
    </div>

    <div class="footer">Sistema interno • Acalanto Bebê</div>
          <div class="footer-logo"></div>
</div>
    <script>
    // ⚠️ COLE A URL DA SUA IMPLANTAÇÃO AQUI EMBAIXO:
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh5-squRJFg5rgQUtvSuah39kqv3ZB5GjhSIgA2Dl1HERelUGTH9lbdIxcgA6V_Lon/exec";

    let activitiesArray = JSON.parse(localStorage.getItem('acalanto_activities')) || [];
    let sessionData = JSON.parse(localStorage.getItem('acalanto_session')) || null;
    let currentLocation = null;

    function entrarFullscreen() {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) return; 
        const el = document.documentElement;
        const requestMethod = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (requestMethod) requestMethod.call(el).catch(err => console.log(err));
    }

    document.addEventListener("click", entrarFullscreen, { once: true });

    window.addEventListener('load', () => {
        getLocation(); 
        updateTimeToNow();
        renderList();
        if (sessionData) {
            document.getElementById('professional').value = sessionData.professional;
            document.getElementById('atendimento').value = sessionData.atendimento;
        }
    });

    function getLocation() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { currentLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude }; },
                (err) => console.warn("Erro localização:", err.message),
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }
    }

    function updateTimeToNow() {
        const now = new Date();
        document.getElementById("time").value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    }

    function toggleFraldaOptions() {
        const activity = document.getElementById("activity").value;
        document.getElementById("fraldaOptions").style.display = (activity === "troca de fralda") ? "block" : "none";
    }

    document.getElementById("infoForm").addEventListener("submit", e => {
        e.preventDefault();
        sessionData = {
            professional: document.getElementById("professional").value,
            atendimento: document.getElementById("atendimento").value
        };
        localStorage.setItem('acalanto_session', JSON.stringify(sessionData));
        alert("✅ Dados da sessão guardados!");
    });

    // --- FUNÇÃO DE ENVIO PARA O GOOGLE SHEETS ---
    async function sendToGoogleSheets(data) {
        if (GOOGLE_SCRIPT_URL === "SUA_URL_AQUI") return; // Não envia se não configurou a URL

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Necessário para Google Apps Script
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            console.log("Enviado para a planilha!");
        } catch (error) {
            console.error("Erro ao enviar:", error);
        }
    }

    document.getElementById("activityForm").addEventListener("submit", async e => {
        e.preventDefault();
        if (!sessionData) return alert("⚠️ Primeiro, confirme os dados da sessão!");

        const activity = document.getElementById("activity").value;
        let tipoTrocaLabel = "";
        
        if (activity === "troca de fralda") {
            const r = document.querySelector('input[name="tipo_troca"]:checked');
            if (!r) return alert("⚠️ Selecione o tipo de troca!");
            const labels = { 'coco': '💩 Cocô', 'xixi': '💧 Xixi', 'coco_xixi': '💩💧 Ambos' };
            tipoTrocaLabel = labels[r.value];
        }

        const newActivity = {
            date: new Date().toLocaleDateString('pt-BR'),
            professional: sessionData.professional,
            atendimento: sessionData.atendimento,
            time: document.getElementById("time").value,
            activity: activity,
            tipoTroca: tipoTrocaLabel,
            obs: document.getElementById("obs").value,
            location: currentLocation ? `${currentLocation.lat}, ${currentLocation.lon}` : "Não disponível"
        };

        // Salva Localmente
        activitiesArray.push(newActivity);
        localStorage.setItem('acalanto_activities', JSON.stringify(activitiesArray));
        
        // Envia para o Google Planilhas
        sendToGoogleSheets(newActivity);

        renderList();
        e.target.reset();
        updateTimeToNow();
        toggleFraldaOptions();
    });

    function renderList() {
        const list = document.getElementById("list");
        if (activitiesArray.length === 0) {
            list.innerHTML = '<li style="color:#999; text-align:center">Nenhum registro.</li>';
            return;
        }
        list.innerHTML = '';
        activitiesArray.forEach((item) => {
            const li = document.createElement("li");
            let titulo = item.activity.toUpperCase();
            if (item.tipoTroca) titulo += ` - ${item.tipoTroca}`;
            li.innerHTML = `
                <div style="display: flex; justify-content: space-between;">
                    <strong>${item.time}</strong>
                    <span style="color: #ff6fb7; font-weight: 700; font-size: 13px;">${titulo}</span>
                </div>
                ${item.obs ? `<div style="margin-top: 5px; font-size: 13px; color: #777; border-top: 1px dashed #eee; padding-top: 3px;">📝 ${item.obs}</div>` : ''}
            `;
            list.appendChild(li);
        });
    }

    function clearAllData() {
        if (confirm("⚠️ Deseja apagar tudo? Isso limpa apenas a lista local.")) {
            localStorage.clear();
            activitiesArray = [];
            sessionData = null;
            location.reload();
        }
    }

    // Botões de salvar e compartilhar permanecem iguais...
    document.getElementById("save").addEventListener("click", () => {
        if (!sessionData || activitiesArray.length === 0) return alert("⚠️ Nada para salvar!");
        let content = `DIÁRIO ACALANTO BEBÊ\nPROFISSIONAL: ${sessionData.professional}\nATENDIMENTO: ${sessionData.atendimento}\n\n`;
        activitiesArray.forEach((a, i) => {
            content += `${i+1}. [${a.time}] ${a.activity.toUpperCase()}${a.tipoTroca ? ' ('+a.tipoTroca+')' : ''}\n`;
            content += `   📍 Localização: ${a.location}\n${a.obs ? '   Obs: '+a.obs : ''}\n---------------------------\n`;
        });
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `diario_acalanto.txt`;
        a.click();
    });

    document.getElementById("share").addEventListener("click", () => {
        if (!sessionData || activitiesArray.length === 0) return alert("⚠️ Nada para compartilhar!");
        let msg = `*DIÁRIO ACALANTO BEBÊ*\n*Profissional:* ${sessionData.professional}\n*Atendimento:* ${sessionData.atendimento}\n\n`;
        activitiesArray.forEach(a => {
            msg += `• [${a.time}] *${a.activity.toUpperCase()}* ${a.tipoTroca ? '['+a.tipoTroca+']' : ''}\n${a.obs ? '_'+a.obs+'_' : ''}\n\n`;
        });
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    });

    window.onbeforeunload = function() { if (activitiesArray.length > 0) return "Tem dados não salvos!"; };
</script>
</body>
</html>
